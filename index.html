<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>みつばち日記カード | おしえてかめさん</title>
    
    <!-- スマホのホーム画面ショートカット・PWA設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="みつばち日記">
    <link rel="apple-touch-icon" href="IMG_4277.png">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- HTML要素を画像化するためのライブラリ（CDN経由） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>🐝 みつばち日記カード</h1>
            <p class="subtitle">今日の良かったことを3つ集めて、ハチミツ色のカードを作ろう</p>
        </div>
    </header>

    <main class="container">
        <!-- 日記入力フォーム -->
        <section class="card input-section">
            <h3>🍯 今日の良かったことを3つ教えてね</h3>
            
            <div class="form-group">
                <label for="input-good1">1つめの良かったこと</label>
                <input type="text" id="input-good1" placeholder="例: 朝ご飯のトーストが美味しく焼けた！" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="input-good2">2つめの良かったこと</label>
                <input type="text" id="input-good2" placeholder="例: 欲しかった本を本屋さんで見つけた" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="input-good3">3つめの良かったこと</label>
                <input type="text" id="input-good3" placeholder="例: 今日も1日、元気に笑顔で過ごせた" autocomplete="off">
            </div>

            <button id="save-btn" class="btn btn-primary">日記カードを作成してメモ帳を開く</button>
        </section>

        <!-- 過去の日記履歴一覧 -->
        <section class="history-section">
            <h2>📦 アプリ内の日記ストック</h2>
            <div id="diary-list-container">
                <!-- ここにJavaScriptで日記の履歴が挿入されます -->
            </div>
        </section>
    </main>

    <!-- html2canvasで画像化するための一時的な隠しステージ -->
    <div id="capture-stage">
        <div class="capture-card">
            <div class="capture-header">🐝 今日の「良かったこと」日記</div>
            <div id="capture-date" class="capture-date"></div>
            
            <div class="capture-item">
                <span class="honey-icon">🍯</span>
                <div id="capture-good1" class="capture-text"></div>
            </div>
            <div class="capture-item">
                <span class="honey-icon">🍯</span>
                <div id="capture-good2" class="capture-text"></div>
            </div>
            <div class="capture-item">
                <span class="honey-icon">🍯</span>
                <div id="capture-good3" class="capture-text"></div>
            </div>
        </div>
    </div>

    <!-- 通知ポップアップ（トースト） -->
    <div id="toast" class="toast"></div>

    <footer>
        <p>&copy; 2026 おしえてかめさん | 小さな幸せを集める日記ツール</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
