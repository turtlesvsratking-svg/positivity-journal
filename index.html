<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>みつばち日記 | おしえてかめさん</title>
    
    <!-- iPhoneホーム画面追加用の設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="みつばち日記">
    <link rel="apple-touch-icon" href="IMG_4277.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-container">
            <h1>🌙 みつばち日記</h1>
            <p class="subtitle">みつばちのように、日常の小さな「蜜」を集めよう</p>
        </div>
    </header>

    <main class="container">
        <!-- 入力エリア（設定不要でここからスタートできます） -->
        <section class="card input-section">
            <h2 class="date-today" id="currentDate">2026年5月21日</h2>
            <p class="guide-text">どんなに小さなことでも大丈夫。今日集めた3つの蜜（良いこと）を教えてください。</p>
            
            <div class="input-group">
                <span class="number">1.</span>
                <input type="text" id="good1" placeholder="例：お気に入りのカフェに行けた" autocorrect="off" autocomplete="off">
            </div>
            <div class="input-group">
                <span class="number">2.</span>
                <input type="text" id="good2" placeholder="例：欲しかった本を買った" autocorrect="off" autocomplete="off">
            </div>
            <div class="input-group">
                <span class="number">3.</span>
                <input type="text" id="good3" placeholder="例：お風呂にゆっくり浸かれた" autocorrect="off" autocomplete="off">
            </div>

            <button id="saveBtn" class="btn btn-primary">今日の日記をコピーしてメモを開く</button>
        </section>

        <!-- 使い方ガイド -->
        <section class="card guide-card">
            <h3>💡 かんたん3ステップの使い方</h3>
            <ol class="usage-list">
                <li>3つの良いことを入力して、上の<strong>黄色いボタン</strong>を押します。</li>
                <li>自動的にiPhoneの「メモ」アプリがパッと起動します。</li>
                <li>お好きなノート（または新規ノート）を開き、画面をタップして<strong>「ペースト（貼り付け）」</strong>するだけで蓄積完了！</li>
            </ol>
        </section>

        <!-- 振り返りエリア -->
        <section class="history-section">
            <h2>アプリ内の「蜜」の履歴</h2>
            <div id="historyList">
                <!-- 過去の日記がここに挿入されます -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 おしえてかめさん | 心を整えるWebツール</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
